services:
  - type: web
    name: meteo-ai-backend
    runtime: python
    rootDir: meteo-backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m alembic -c alembic.ini upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ready
    envVars:
      - key: DATABASE_URL
        sync: false        # imposta manualmente su Render dashboard
      - key: GEMINI_API_KEY
        sync: false        # imposta manualmente su Render dashboard
      - key: ADMIN_API_TOKEN
        sync: false        # richiesto per /api/admin/* e /api/ml/train
      - key: FRONTEND_ORIGIN
        value: "https://leprevisioni.netlify.app"
      - key: APP_ENV
        value: "production"
      - key: CHAT_REQUESTS_PER_MINUTE
        value: "15"
      - key: CHAT_REQUESTS_PER_DAY
        value: "300"
      - key: PYTHON_VERSION
        value: "3.11.4"
